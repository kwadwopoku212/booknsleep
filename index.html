<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book N Sleep</title>
    <link rel="stylesheet" href="style.css">
    <script src="particles.js"></script>
</head>
<body>
    <header>
        <div class="hero animated">
            <h1>Discover Your Next Adventure with AI at Work</h1>
            <div id="ai-animation"></div>
        </div>
    </header>
    <main>
        <section class="carousel">
            <h2>Travel Gallery</h2>
            <div class="gallery">
                <img src="https://source.unsplash.com/featured/?beach,tropical" alt="Tropical Beach">
                <img src="https://source.unsplash.com/featured/?city,iconic" alt="Iconic City">
                <img src="https://source.unsplash.com/featured/?mountain,retreat" alt="Mountain Retreat">
                <img src="https://source.unsplash.com/featured/?culture,architecture" alt="Cultural Site">
            </div>
        </section>
        <section class="features">
            <div class="feature-card animated">
                <h3>Feature 1</h3>
                <p>Description 1</p>
            </div>
            <div class="feature-card animated">
                <h3>Feature 2</h3>
                <p>Description 2</p>
            </div>
            <div class="feature-card animated">
                <h3>Feature 3</h3>
                <p>Description 3</p>
            </div>
        </section>
        <section class="ai-work animated">
            <h2>AI at Work</h2>
            <div class="data-visual"></div>
        </section>
    </main>
    <script>
        // Initialize animations and particles
        particlesJS.load('particles-js', 'particles.json', function() {
            console.log('callback - particles.js config loaded');
        });
        // Additional AI animation code
    </script>
</body>
</html>
