<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book n Sleep</title>
    <style>
        /* Add original styles here if necessary */
        body { font-family: Arial, sans-serif; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        form { margin: 20px 0; }
        .cta-section { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 20px; }
    </style>
    <script>
        function validateEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function handleFormSubmit(formId) {
            const emailField = document.getElementById(formId).querySelector('input[type="email"]');
            const email = emailField.value;
            if (!validateEmail(email)) {
                alert('Please enter a valid email address.');
                return;
            }
            // Here you can write the code to integrate with Google Sheets
            console.log(`Form submitted: ${email}`);
            // Add Google Sheets backend integration code here...
        }

        function analyticsTracking() {
            console.log('Analytics tracking code here.');
        }

        window.onload = analyticsTracking;
    </script>
</head>
<body>
    <div class="container">
        <h1>Welcome to Book n Sleep</h1>
        <form id="hero-waitlist" onsubmit="handleFormSubmit('hero-waitlist'); return false;">
            <label for="email-hero">Join the Hero Waitlist:</label>
            <input type="email" id="email-hero" placeholder="Enter your email" required />
            <button type="submit">Submit</button>
        </form>

        <div class="cta-section">
            <h2>Final Call to Action!</h2>
            <form id="final-waitlist" onsubmit="handleFormSubmit('final-waitlist'); return false;">
                <label for="email-final">Join the Final Waitlist:</label>
                <input type="email" id="email-final" placeholder="Enter your email" required />
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
