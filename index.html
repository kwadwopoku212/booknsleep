<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book N Sleep</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero Section -->
    <header style="background-image: url('https://source.unsplash.com/featured/?travel');">
        <h1>Welcome to Book N Sleep</h1>
    </header>

    <!-- Destination Showcase Gallery -->
    <section class="gallery">
        <h2>Destination Highlights</h2>
        <div class="gallery-item" style="background-image: url('https://source.unsplash.com/featured/?beach');"></div>
        <div class="gallery-item" style="background-image: url('https://source.unsplash.com/featured/?mountains');"></div>
        <div class="gallery-item" style="background-image: url('https://source.unsplash.com/featured/?city');"></div>
    </section>

    <!-- Feature Cards -->
    <section class="features">
        <h2>Features</h2>
        <div class="feature-card" style="background-image: url('https://source.unsplash.com/featured/?hotel');">
            <h3>Best Hotels</h3>
        </div>
        <div class="feature-card" style="background-image: url('https://source.unsplash.com/featured/?restaurant');">
            <h3>Top Restaurants</h3>
        </div>
        <div class="feature-card" style="background-image: url('https://source.unsplash.com/featured/?adventure');">
            <h3>Adventures Await</h3>
        </div>
    </section>

    <!-- Testimonial Section -->
    <section class="testimonials">
        <h2>What Our Clients Say</h2>
        <div class="testimonial" style="background-image: url('https://source.unsplash.com/featured/?travel');">
            <p>"The best travel experience ever!"</p>
            <p>- Happy Traveler</p>
        </div>
        <div class="testimonial" style="background-image: url('https://source.unsplash.com/featured/?exploration');">
            <p>"I loved every bit of my journey!"</p>
            <p>- Satisfied Client</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Book N Sleep - All Rights Reserved</p>
    </footer>
</body>
</html>
