<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book n Sleep</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        const FORM_URL = 'YOUR_GOOGLE_SHEETS_FORM_URL_HERE';

        function handleFormSubmission(formId) {
            const emailInputId = formId === 'hero-waitlist' ? 'hero-email' : 'final-email';
            const email = document.getElementById(emailInputId).value;

            // Form validation
            if (!validateEmail(email)) {
                alert('Please enter a valid email address.');
                return;
            }

            // Submit to Google Sheets
            fetch(FORM_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            }).then(() => {
                alert('Thank you for signing up!');
                document.getElementById(formId).reset();
            }).catch(error => {
                console.error('Error:', error);
                alert('There was an error submitting your form. Please try again.');
            });
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }

        function initializeAnalytics() {
            // Stub function for analytics
            console.log('Analytics initialized');
        }

        document.addEventListener('DOMContentLoaded', initializeAnalytics);
    </script>
</head>
<body>
    <div id="hero" class="section">
        <h1>Welcome to Book n Sleep</h1>
        <form id="hero-waitlist" onsubmit="event.preventDefault(); handleFormSubmission('hero-waitlist');">
            <input type="email" id="hero-email" required placeholder="Enter your email">
            <button type="submit">Join Waitlist</button>
        </form>
    </div>

    <div id="stats" class="section">
        <h2>Our Stats</h2>
        <!-- Stats content goes here -->
    </div>

    <div id="vision" class="section">
        <h2>Our Vision</h2>
        <!-- Vision content goes here -->
    </div>

    <div id="features" class="section">
        <h2>Features</h2>
        <!-- Features content goes here -->
    </div>

    <div id="map" class="section">
        <h2>Our Map</h2>
        <!-- Map content goes here -->
    </div>

    <div id="timeline" class="section">
        <h2>Timeline</h2>
        <!-- Timeline content goes here -->
    </div>

    <div id="help-demo" class="section">
        <h2>Help Demo</h2>
        <!-- Help demo content goes here -->
    </div>

    <div id="final-cta" class="section">
        <h2>Final Call To Action</h2>
        <form id="final-waitlist" onsubmit="event.preventDefault(); handleFormSubmission('final-waitlist');">
            <input type="email" id="final-email" required placeholder="Enter your email">
            <button type="submit">Join Final Waitlist</button>
        </form>
    </div>
</body>
</html>
