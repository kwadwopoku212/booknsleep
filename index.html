<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BooknSleep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    function BooknSleepHomepageRedesign() {
      const { useState } = React;
      const [menuOpen, setMenuOpen] = useState(false);
      const [audience, setAudience] = useState("guests");

      const destinations = [
        { name: "Los Angeles", tagline: "Urban stays with premium reach", image: "https://images.unsplash.com/photo-1534190760961-74e8c1c5c3da?auto=format&fit=crop&w=1400&q=80" },
        { name: "Valletta", tagline: "Mediterranean booking demand", image: "https://images.unsplash.com/photo-1516483638261-f4dbaf036963?auto=format&fit=crop&w=1400&q=80" },
        { name: "London", tagline: "High trust travel corridor", image: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=1400&q=80" },
      ];

      const features = [
        { title: "Smart Booking", desc: "Search and reserve trusted stays with less friction.", stat: "Fast confirmation" },
        { title: "AI Pricing", desc: "Sika reads timing, demand, and booking rhythm.", stat: "Live price signals" },
        { title: "Live Support", desc: "Real humans backed by fast triage.", stat: "24/7 response" },
        { title: "Secure Payments", desc: "Protected checkout and cleaner trust.", stat: "Clear receipts" },
      ];

      const audienceCards = {
        guests: {
          title: "For Guests",
          bullets: ["Clear booking flow", "Trusted stays", "Fair pricing visibility", "Live support when needed"],
          cta: "Start Booking",
        },
        hosts: {
          title: "For Hosts",
          bullets: ["Direct visibility", "Lower friction operations", "Smarter pricing guidance", "Support for trust and disputes"],
          cta: "List Your Property",
        },
      };

      const selectedAudience = audienceCards[audience];

      return (
        <div className="min-h-screen bg-neutral-950 text-white">
          <header className="sticky top-0 z-50 border-b border-white/10 bg-neutral-950/90 backdrop-blur">
            <div className="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
              <div className="flex items-center gap-3">
                <div className="flex h-10 w-10 items-center justify-center rounded-2xl bg-emerald-500/20 font-semibold text-emerald-300 ring-1 ring-emerald-400/30">B</div>
                <div>
                  <div className="text-base font-semibold tracking-tight">BooknSleep</div>
                  <div className="text-xs text-white/50">Travel guided by Sika</div>
                </div>
              </div>

              <nav className="hidden items-center gap-8 text-sm text-white/75 md:flex">
                <a href="#audience" className="transition hover:text-white">Guests</a>
                <a href="#audience" className="transition hover:text-white">Hosts</a>
                <a href="#sika" className="transition hover:text-white">Sika</a>
                <a href="#support" className="transition hover:text-white">Support</a>
              </nav>

              <div className="flex items-center gap-3">
                <button className="hidden rounded-xl border border-white/15 px-4 py-2 text-sm text-white/80 sm:inline-flex">Join Waitlist</button>
                <button className="hidden rounded-xl bg-emerald-400 px-4 py-2 text-sm font-medium text-neutral-950 sm:inline-flex">Launch Preview</button>
                <button
                  type="button"
                  className="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-white/10 bg-white/[0.03] md:hidden"
                  aria-label="Toggle navigation"
                  onClick={() => setMenuOpen(!menuOpen)}
                >
                  {menuOpen ? "X" : "="}
                </button>
              </div>
            </div>

            {menuOpen && (
              <div className="border-t border-white/10 px-4 py-4 md:hidden">
                <div className="grid gap-2 text-sm text-white/80">
                  <a href="#audience" className="rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3" onClick={() => setMenuOpen(false)}>Guests</a>
                  <a href="#audience" className="rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3" onClick={() => setMenuOpen(false)}>Hosts</a>
                  <a href="#sika" className="rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3" onClick={() => setMenuOpen(false)}>Sika</a>
                  <a href="#support" className="rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3" onClick={() => setMenuOpen(false)}>Support</a>
                </div>
              </div>
            )}
          </header>

          <main>
            <section className="relative overflow-hidden">
              <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(16,185,129,0.18),transparent_30%),radial-gradient(circle_at_left,rgba(59,130,246,0.14),transparent_25%)]"></div>
              <div className="relative mx-auto grid max-w-6xl gap-8 px-4 py-10 sm:px-6 sm:py-16 lg:grid-cols-[1.05fr,0.95fr] lg:items-center lg:py-24">
                <div>
                  <div className="mb-5 inline-flex items-center gap-2 rounded-full border border-emerald-400/20 bg-emerald-500/10 px-3 py-1 text-[11px] font-medium uppercase tracking-[0.18em] text-emerald-300">
                    <span className="h-2 w-2 rounded-full bg-emerald-300"></span>
                    Intelligent travel platform
                  </div>
                  <h1 className="max-w-3xl text-[2.5rem] font-semibold leading-[0.95] tracking-[-0.04em] sm:text-5xl lg:text-7xl">
                    <span className="block">BooknSleep</span>
                    <span className="block text-white/90">moves travelers.</span>
                    <span className="mt-2 block bg-gradient-to-r from-emerald-300 via-emerald-400 to-cyan-300 bg-clip-text text-transparent">Sika</span>
                    <span className="block bg-gradient-to-r from-emerald-200 via-emerald-300 to-emerald-100 bg-clip-text text-transparent">moves intelligence.</span>
                  </h1>
                  <p className="mt-5 max-w-2xl text-sm leading-7 text-white/75 sm:text-lg sm:leading-8">
                    Smarter stays, cleaner booking flow, trusted support, and pricing guidance that feels alive without turning the platform into a noisy AI circus.
                  </p>

                  <div className="mt-8 grid gap-3 sm:flex sm:flex-wrap">
                    <button className="min-h-[52px] rounded-2xl bg-white px-5 py-3 text-sm font-medium text-neutral-950">Explore Stays</button>
                    <button className="min-h-[52px] rounded-2xl border border-white/15 px-5 py-3 text-sm font-medium text-white/85">Meet Sika</button>
                  </div>

                  <div className="mt-4 grid grid-cols-2 gap-3 sm:mt-8 sm:grid-cols-4">
                    {[
                      ["24/7", "Faster support thinking"],
                      ["Built in", "Trust-focused booking flow"],
                      ["Sika", "Intelligence layer"],
                      ["Always", "Human-backed platform"],
                    ].map(([value, label]) => (
                      <div key={label} className="rounded-2xl border border-white/10 bg-white/5 p-4">
                        <div className="text-lg font-semibold sm:text-xl">{value}</div>
                        <div className="mt-1 text-xs leading-5 text-white/55">{label}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="space-y-4">
                  <div className="overflow-hidden rounded-[28px] border border-white/10 bg-white/[0.03]">
                    <div className="flex snap-x snap-mandatory gap-4 overflow-x-auto p-3 [scrollbar-width:none] sm:p-4">
                      {destinations.map((item) => (
                        <div key={item.name} className="min-w-[82%] snap-center overflow-hidden rounded-[24px] border border-white/10 bg-neutral-900/70 sm:min-w-[320px]">
                          <img src={item.image} alt={item.name} className="h-52 w-full object-cover sm:h-56" />
                          <div className="border-t border-white/10 p-4">
                            <div className="text-lg font-semibold">{item.name}</div>
                            <div className="mt-1 text-sm text-white/55">{item.tagline}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="rounded-[28px] border border-white/10 bg-white/5 p-4">
                    <div className="rounded-[24px] border border-white/10 bg-neutral-900 p-4 sm:p-5">
                      <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                        <div>
                          <div className="text-sm font-medium text-white/60">Sika Live</div>
                          <div className="mt-1 text-xl font-semibold sm:text-2xl">Booking Intelligence Panel</div>
                        </div>
                        <div className="w-fit rounded-full bg-emerald-500/15 px-3 py-1 text-xs text-emerald-300 ring-1 ring-emerald-400/20">Active</div>
                      </div>

                      <div className="mt-6 space-y-3">
                        {[
                          ["Destination detected", "Los Angeles | Valletta | London"],
                          ["Booking confidence", "High for next 3 hours"],
                          ["Price stability", "Stable window open"],
                        ].map(([label, value]) => (
                          <div key={label} className="flex flex-col gap-1 rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3 sm:flex-row sm:items-center sm:justify-between">
                            <span className="text-sm text-white/55">{label}</span>
                            <span className="text-sm font-medium">{value}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-6xl px-4 py-10 sm:px-6 sm:py-12">
              <div className="rounded-[28px] border border-white/10 bg-white/[0.03] p-5">
                <div className="mb-4 flex items-center justify-between gap-3">
                  <div>
                    <div className="text-sm font-medium text-white">Quick Search</div>
                    <div className="text-xs text-white/50">Thumb-friendly booking flow for small screens.</div>
                  </div>
                  <div className="rounded-full border border-white/10 bg-white/[0.03] px-3 py-1 text-[11px] uppercase tracking-[0.18em] text-emerald-300">Mobile first</div>
                </div>
                <div className="grid gap-3 md:grid-cols-5">
                  <input className="min-h-[52px] rounded-2xl bg-neutral-900 px-4 py-3 text-sm text-white outline-none" placeholder="Destination" />
                  <input className="min-h-[52px] rounded-2xl bg-neutral-900 px-4 py-3 text-sm text-white outline-none" placeholder="Check-in" />
                  <input className="min-h-[52px] rounded-2xl bg-neutral-900 px-4 py-3 text-sm text-white outline-none" placeholder="Check-out" />
                  <input className="min-h-[52px] rounded-2xl bg-neutral-900 px-4 py-3 text-sm text-white outline-none" placeholder="Guests" />
                  <button className="min-h-[52px] rounded-2xl bg-emerald-400 px-4 py-3 text-sm font-medium text-neutral-950">Search</button>
                </div>
              </div>
            </section>

            <section className="border-y border-white/10 bg-neutral-900/60">
              <div className="mx-auto max-w-6xl px-4 py-10 sm:px-6">
                <div className="mb-6">
                  <div className="text-xs font-medium uppercase tracking-[0.2em] text-emerald-300/80 sm:text-sm">Travel Services | Premium OTA Layer</div>
                  <h2 className="mt-2 max-w-2xl text-xl font-semibold tracking-tight sm:text-2xl">Premium travel movement shaped like a serious OTA.</h2>
                </div>
                <div className="grid grid-cols-2 gap-3 sm:gap-4 md:grid-cols-3 lg:grid-cols-6">
                  {[
                    ["ST", "Stays"],
                    ["FL", "Flights"],
                    ["TR", "Trains"],
                    ["CR", "Car Rentals"],
                    ["AP", "Airport Pickup"],
                    ["EX", "Experiences"],
                  ].map(([icon, title]) => (
                    <div key={title} className="rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-4 text-center">
                      <div className="mx-auto flex h-11 w-11 items-center justify-center rounded-2xl bg-white/5 text-sm font-semibold tracking-[0.18em] text-emerald-300">{icon}</div>
                      <div className="mt-3 text-sm font-medium">{title}</div>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section className="mx-auto max-w-6xl px-4 py-14 sm:px-6 sm:py-20">
              <div className="max-w-2xl">
                <div className="text-sm font-medium uppercase tracking-[0.2em] text-emerald-300/80">Core Platform</div>
                <h2 className="mt-4 text-2xl font-semibold tracking-tight sm:text-4xl">The homepage should feel like a system, not a slideshow.</h2>
                <p className="mt-4 text-base leading-7 text-white/65">BooknSleep is the platform people use. Sika is the intelligence that quietly sharpens decisions, support, trust, and pricing behind the scenes.</p>
              </div>
              <div className="mt-8 grid gap-4 sm:mt-10 sm:gap-5 md:grid-cols-2 xl:grid-cols-4">
                {features.map((card) => (
                  <div key={card.title} className="rounded-[24px] border border-white/10 bg-white/[0.03] p-6">
                    <div className="inline-flex rounded-xl bg-emerald-500/10 px-3 py-1 text-xs font-medium text-emerald-300">{card.stat}</div>
                    <h3 className="mt-4 text-xl font-semibold">{card.title}</h3>
                    <p className="mt-3 text-sm leading-6 text-white/65">{card.desc}</p>
                  </div>
                ))}
              </div>
            </section>

            <section id="sika" className="bg-neutral-900/60">
              <div className="mx-auto max-w-6xl px-4 py-14 sm:px-6 sm:py-20">
                <div className="grid gap-10 lg:grid-cols-[0.95fr,1.05fr]">
                  <div>
                    <div className="text-sm font-medium uppercase tracking-[0.2em] text-emerald-300/80">Intelligence Layer</div>
                    <h2 className="mt-4 text-2xl font-semibold tracking-tight sm:text-4xl">Meet the minds behind the platform.</h2>
                    <p className="mt-4 text-base leading-7 text-white/65">Focused intelligence, distributed by role, built to serve real booking and support outcomes.</p>
                  </div>
                  <div className="grid gap-4 md:grid-cols-3">
                    {[
                      ["Sika", "Economic Intelligence", "Learns what affects bookings, pricing, trust, and guest movement."],
                      ["Kojo", "Resolution Intelligence", "Handles issue routing and booking recovery when things go sideways."],
                      ["Yaa", "Dispatch Intelligence", "Coordinates local action and response flow where timing matters."],
                    ].map(([name, role, text]) => (
                      <div key={name} className="rounded-[24px] border border-white/10 bg-white/[0.03] p-6">
                        <div className="text-sm font-medium text-emerald-300">{role}</div>
                        <h3 className="mt-3 text-2xl font-semibold">{name}</h3>
                        <p className="mt-3 text-sm leading-6 text-white/65">{text}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            <section id="audience" className="mx-auto max-w-6xl px-4 py-14 sm:px-6 sm:py-20">
              <div className="max-w-2xl">
                <div className="text-sm font-medium uppercase tracking-[0.2em] text-emerald-300/80">Choose Your Door</div>
                <h2 className="mt-4 text-2xl font-semibold tracking-tight sm:text-4xl">Built for both sides of the stay.</h2>
              </div>

              <div className="mt-8 rounded-[28px] border border-white/10 bg-white/[0.03] p-3 md:hidden">
                <div className="grid grid-cols-2 gap-2">
                  <button type="button" className={`min-h-[48px] rounded-2xl px-4 py-3 text-sm font-medium ${audience === "guests" ? "bg-emerald-400 text-neutral-950" : "border border-white/10 bg-neutral-950 text-white/75"}`} onClick={() => setAudience("guests")}>Guests</button>
                  <button type="button" className={`min-h-[48px] rounded-2xl px-4 py-3 text-sm font-medium ${audience === "hosts" ? "bg-emerald-400 text-neutral-950" : "border border-white/10 bg-neutral-950 text-white/75"}`} onClick={() => setAudience("hosts")}>Hosts</button>
                </div>
                <div className="mt-3 rounded-[24px] border border-white/10 bg-neutral-950 p-6">
                  <div className="text-sm font-medium text-emerald-300">Mobile view</div>
                  <h3 className="mt-3 text-2xl font-semibold">{selectedAudience.title}</h3>
                  <ul className="mt-5 space-y-3 text-sm text-white/70">
                    {selectedAudience.bullets.map((bullet) => (
                      <li key={bullet} className="flex items-center gap-3">
                        <span className="h-2.5 w-2.5 rounded-full bg-emerald-300"></span>
                        {bullet}
                      </li>
                    ))}
                  </ul>
                  <button className="mt-8 min-h-[52px] w-full rounded-2xl bg-white px-5 py-3 text-sm font-medium text-neutral-950">{selectedAudience.cta}</button>
                </div>
              </div>

              <div className="mt-10 hidden gap-6 md:grid md:grid-cols-2">
                {Object.entries(audienceCards).map(([key, item]) => (
                  <div key={key} id={key} className="rounded-[28px] border border-white/10 bg-white/[0.03] p-8">
                    <h3 className="text-2xl font-semibold">{item.title}</h3>
                    <ul className="mt-6 space-y-3 text-sm text-white/70">
                      {item.bullets.map((bullet) => (
                        <li key={bullet} className="flex items-center gap-3">
                          <span className="h-2.5 w-2.5 rounded-full bg-emerald-300"></span>
                          {bullet}
                        </li>
                      ))}
                    </ul>
                    <button className="mt-8 rounded-2xl bg-white px-5 py-3 text-sm font-medium text-neutral-950">{item.cta}</button>
                  </div>
                ))}
              </div>
            </section>

            <section id="support" className="mx-auto max-w-6xl px-4 py-14 sm:px-6 sm:py-20">
              <div className="rounded-[32px] border border-white/10 bg-gradient-to-r from-emerald-500/10 via-white/[0.03] to-blue-500/10 p-6 sm:p-10">
                <div className="grid gap-10 lg:grid-cols-[1.1fr,0.9fr] lg:items-center">
                  <div>
                    <div className="text-sm font-medium uppercase tracking-[0.2em] text-emerald-300/80">Support Promise</div>
                    <h2 className="mt-4 text-2xl font-semibold tracking-tight sm:text-4xl">Fast when it should be fast. Human when it must be human.</h2>
                    <p className="mt-4 max-w-2xl text-base leading-7 text-white/70">BooknSleep combines real people with intelligent triage. That means less waiting, better routing, and fewer moments where travelers feel stranded.</p>
                  </div>
                  <div className="rounded-[28px] border border-white/10 bg-neutral-950/70 p-5 sm:p-6">
                    <div className="space-y-4 text-sm">
                      {[
                        ["Issue detected", "Kojo starts resolution logic"],
                        ["Urgency checked", "Sika scores support priority"],
                        ["Local action needed", "Yaa dispatches next step"],
                        ["Human oversight", "Support confirms the outcome"],
                      ].map(([title, desc]) => (
                        <div key={title} className="rounded-2xl border border-white/10 bg-white/[0.03] p-4">
                          <div className="font-medium text-white">{title}</div>
                          <div className="mt-1 text-white/60">{desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<BooknSleepHomepageRedesign />);
  </script>
</body>
</html>
